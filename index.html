          <div class="hero-copy">
            <h1>瑄宝闯三国</h1>
            <p>跟着小军师走三国地图，每一关练一次表达、判断、复盘和换办法。从小沛到乌巢，选择一关，先把理由讲清楚。</p>
            <div class="mode-picker" aria-label="选择模式">
              <button class="mode-card is-selected" type="button" data-mode="family">
                <span>亲子模式</span>
                <small>家长陪玩，少纠正，多追问</small>
              </button>
              <button class="mode-card" type="button" data-mode="kid">
                <span>孩子模式</span>
                <small>自己闯关，系统温和提示</small>
              </button>
            </div>
            <div class="hero-actions">
              <button class="primary-btn" type="button" data-view="map">打开三国地图</button>
              <button class="ghost-btn" type="button" data-view="journal">看成长册</button>
            </div>
          </div>
        </section>

        <section class="view" id="mapView">
          <div class="section-heading">
            <p class="eyebrow">群雄混战与刘备漂泊</p>
            <p class="section-note">先点地图上的阶段，再选择今天想玩的故事。每个阶段只展开几关，页面不挤，也可以自由跳关。</p>
          </div>
          <div class="map-grid" id="levelGrid"></div>
        </section>

        <section class="view play-view" id="playView">
          <div class="play-layout">
            <aside class="level-rail">
              <button class="back-btn" type="button" data-view="map">返回关卡</button>
              <div id="levelSummary"></div>
            </aside>
            <section class="play-panel">
              <div class="stepper" id="stepper"></div>
              <div id="playStage"></div>
            </section>
          </div>
        </section>

        <section class="view" id="journalView">
          <div class="section-heading row-heading">
            <div>
              <p class="eyebrow">成长册</p>
              <h2>每次闯关都留下一张成长卡</h2>
            </div>
            <div class="journal-actions">
              <button class="primary-btn" type="button" id="exportJournalBtn">导出成长册</button>
              <button class="ghost-btn" type="button" id="importJournalBtn">导入成长册</button>
              <button class="ghost-btn danger" type="button" id="clearJournalBtn">清空本机记录</button>
            </div>
          </div>
          <input class="visually-hidden" type="file" id="importJournalInput" accept="application/json,.json">
          <div class="backup-status" id="journalBackupStatus" aria-live="polite"></div>
          <div class="journal-list" id="journalList"></div>
        </section>

        <section class="view" id="parentView">
          <div class="section-heading">
            <p class="eyebrow">家长页</p>
            <h2>只看成长，不做排名</h2>
          </div>
          <div class="parent-grid" id="parentStats"></div>
          <div class="guide-panel">
            <h3>陪玩提醒</h3>
            <div class="guide-list">
              <p>先听完孩子的理由，再追问一句“还有别的办法吗？”</p>
              <p>不要纠正历史细节，重点看她能不能说清楚选择和原因。</p>
              <p>遇到失败关卡时，用“下次换一个什么办法”收尾。</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <template id="emptyJournalTemplate">
      <div class="empty-state">
        <strong>还没有成长卡</strong>
        <p>先完成一个关卡，这里会保存孩子的选择、讲述和徽章。</p>
        <button class="primary-btn" type="button" data-view="map">去闯关</button>
      </div>
    </template>

    <script src="./app.js?v=20260720-0002"></script>
